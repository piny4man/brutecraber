name: Rust Manual Release (Auto Version + Notes)

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # ЁЯУе Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # ЁЯжА Install Rust toolchain
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # ЁЯФН Extract metadata from Cargo.toml
      - name: Extract Cargo metadata
        id: meta
        run: |
          METADATA=$(cargo metadata --no-deps --format-version 1)

          NAME=$(echo $METADATA | jq -r '.packages[0].name')
          VERSION=$(echo $METADATA | jq -r '.packages[0].version')

          ARCH=$(uname -m)
          OS=linux

          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "arch=$ARCH" >> $GITHUB_OUTPUT
          echo "os=$OS" >> $GITHUB_OUTPUT

      # ЁЯПЧя╕П Build release binary
      - name: Build release
        run: cargo build --release --locked

      # ЁЯУж Package binary into tar.gz
      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/${{ steps.meta.outputs.name }} dist/

          cd dist
          tar -czvf ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.os }}-${{ steps.meta.outputs.arch }}.tar.gz ${{ steps.meta.outputs.name }}

      # ЁЯУд Upload artifact (for CI visibility)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.os }}-${{ steps.meta.outputs.arch }}
          path: dist/*.tar.gz

      # ЁЯз╛ Generate structured release notes
      - name: Generate release notes
        run: |
          cat <<EOF > release.md
## ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }} ЁЯЪА

### ЁЯЦея╕П Build Info
- OS: ${{ steps.meta.outputs.os }}
- Architecture: ${{ steps.meta.outputs.arch }}
- Rust Toolchain: stable

---

### тЬи What's Included
- Automated release via GitHub Actions
- Built using \`cargo build --release\`
- Optimized binary for performance

---

### ЁЯУж Download
\`\`\`
${{ steps.meta.outputs.name }}-${{ steps.meta.outputs.os }}-${{ steps.meta.outputs.arch }}.tar.gz
\`\`\`

---

### ЁЯФР Notes
- No manual release steps required
- Version sourced directly from Cargo.toml
- Reproducible build with \`--locked\`

EOF

      # ЁЯЪА Create GitHub Release and upload binary
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }} v${{ steps.meta.outputs.version }}
          body_path: release.md
          files: dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
