name: Rust CI (Linux Minimal Secure)

on:
  push:
    branches: ["**"]        # 🔥 runs on all branches (fork + feature)
  pull_request:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ✅ eliminate Node20 warning

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout (latest stable major)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🦀 Install Rust
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # ⚡ Cache dependencies
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # 🔐 Fast security audit
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Run cargo audit
        run: cargo audit

      # 🏗️ Build release (optimized)
      - name: Build release
        run: cargo build --release --locked

      # 🧪 Run tests
      - name: Run tests
        run: cargo test --all --verbose --locked

      # 📦 Upload binary only
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: brutecraber-linux
          path: target/release/brutecraber
